<!DOCTYPE html>
<html>

<head>
<title>IP Location Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
}

.box{
background:white;
width:350px;
margin:auto;
margin-top:30px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

#map{
height:400px;
width:80%;
margin:auto;
margin-top:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>ข้อมูลการเชื่อมต่อ</h2>

<p><b>IP:</b> <span id="ip">กำลังโหลด...</span></p>
<p><b>ประเทศ:</b> <span id="country">กำลังโหลด...</span></p>
<p><b>เมือง:</b> <span id="city">กำลังโหลด...</span></p>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ดึงข้อมูล IP
fetch("https://ipapi.co/json/")
.then(response => response.json())
.then(data => {

document.getElementById("ip").innerHTML = data.ip
document.getElementById("country").innerHTML = data.country_name
document.getElementById("city").innerHTML = data.city

})


// ใช้ GPS หา location จริง
navigator.geolocation.getCurrentPosition(function(position){

var lat = position.coords.latitude
var lon = position.coords.longitude

var map = L.map('map').setView([lat, lon], 13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

L.marker([lat, lon]).addTo(map)
.bindPopup("ตำแหน่งของคุณ")
.openPopup()

})

</script>

</body>

</html>
