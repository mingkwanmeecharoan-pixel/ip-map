<!DOCTYPE html>
<html>

<head>
<title>Network Information</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family: Arial;
text-align:center;
background:#0f172a;
color:white;
}

.box{
background:#1e293b;
width:380px;
margin:auto;
margin-top:30px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px black;
}

#map{
height:400px;
width:80%;
margin:auto;
margin-top:20px;
border-radius:10px;
}

p{
margin:6px;
}

</style>
</head>

<body>

<div class="box">

<h2>Network Information</h2>

<p><b>IP:</b> <span id="ip">Loading...</span></p>
<p><b>Country:</b> <span id="country"></span> <span id="flag"></span></p>
<p><b>City:</b> <span id="city"></span></p>
<p><b>Internet Provider:</b> <span id="isp"></span></p>

<p><b>Device:</b> <span id="device"></span></p>
<p><b>Browser:</b> <span id="browser"></span></p>
<p><b>Operating System:</b> <span id="os"></span></p>

<p><b>Date:</b> <span id="date"></span></p>
<p><b>Time:</b> <span id="time"></span></p>

<p><b>Latitude:</b> <span id="lat"></span></p>
<p><b>Longitude:</b> <span id="lon"></span></p>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ---------------- IP INFO ----------------

fetch("https://ipapi.co/json/")
.then(res => res.json())
.then(data => {

document.getElementById("ip").innerHTML = data.ip
document.getElementById("country").innerHTML = data.country_name
document.getElementById("city").innerHTML = data.city
document.getElementById("isp").innerHTML = data.org

// country flag
document.getElementById("flag").innerHTML =
"🇨🇴".replace("🇨🇴", getFlagEmoji(data.country_code))

})

function getFlagEmoji(countryCode){
return String.fromCodePoint(...[...countryCode.toUpperCase()].map(c => 127397 + c.charCodeAt()))
}

// ---------------- DATE TIME ----------------

var now = new Date()

document.getElementById("date").innerHTML = now.toLocaleDateString()
document.getElementById("time").innerHTML = now.toLocaleTimeString()

// ---------------- DEVICE ----------------

var ua = navigator.userAgent

if(/mobile/i.test(ua)){
device="Mobile"
}else{
device="Computer"
}

document.getElementById("device").innerHTML = device

// ---------------- BROWSER ----------------

if(ua.indexOf("Chrome")>-1){
browser="Chrome"
}else if(ua.indexOf("Firefox")>-1){
browser="Firefox"
}else if(ua.indexOf("Safari")>-1){
browser="Safari"
}else{
browser="Unknown"
}

document.getElementById("browser").innerHTML = browser

// ---------------- OS ----------------

if(ua.indexOf("Windows")>-1){
os="Windows"
}else if(ua.indexOf("Android")>-1){
os="Android"
}else if(ua.indexOf("iPhone")>-1){
os="iOS"
}else if(ua.indexOf("Mac")>-1){
os="MacOS"
}else{
os="Unknown"
}

document.getElementById("os").innerHTML = os

// ---------------- GPS MAP ----------------

navigator.geolocation.getCurrentPosition(function(position){

var lat = position.coords.latitude
var lon = position.coords.longitude

document.getElementById("lat").innerHTML = lat
document.getElementById("lon").innerHTML = lon

var map = L.map('map').setView([lat, lon], 13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

L.marker([lat, lon]).addTo(map)
.bindPopup("Your Location")
.openPopup()

})

</script>

</body>

</html>
