<!DOCTYPE html>
<html>
<head>

<title>Network Information</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family: Arial;
text-align:center;
background:#0f172a;
color:white;
}

.box{
background:#1e293b;
width:380px;
margin:auto;
margin-top:30px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px black;
}

#map{
height:400px;
width:80%;
margin:auto;
margin-top:20px;
border-radius:10px;
}

p{
margin:6px;
}

</style>

</head>

<body>

<div class="box">

<h2>Network Information</h2>

<p><b>IP:</b> <span id="ip">Loading...</span></p>
<p><b>Country:</b> <span id="country"></span> <span id="flag"></span></p>
<p><b>City:</b> <span id="city"></span></p>
<p><b>Internet Provider:</b> <span id="isp"></span></p>

<p><b>Device:</b> <span id="device"></span></p>
<p><b>Browser:</b> <span id="browser"></span></p>
<p><b>Operating System:</b> <span id="os"></span></p>

<p><b>Date:</b> <span id="date"></span></p>
<p><b>Time:</b> <span id="time"></span></p>

<p><b>Latitude:</b> <span id="lat"></span></p>
<p><b>Longitude:</b> <span id="lon"></span></p>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* -------- IP INFORMATION -------- */

fetch("https://ipapi.co/json/")
.then(response => response.json())
.then(data => {

document.getElementById("ip").innerText = data.ip
document.getElementById("country").innerText = data.country_name
document.getElementById("city").innerText = data.city
document.getElementById("isp").innerText = data.org

// flag
document.getElementById("flag").innerText = getFlagEmoji(data.country_code)

})

function getFlagEmoji(code){
return String.fromCodePoint(...[...code.toUpperCase()].map(c => 127397 + c.charCodeAt()))
}


/* -------- DATE TIME -------- */

var now = new Date()

document.getElementById("date").innerText = now.toLocaleDateString()
document.getElementById("time").innerText = now.toLocaleTimeString()


/* -------- DEVICE -------- */

var ua = navigator.userAgent

var device = /mobile/i.test(ua) ? "Mobile" : "Computer"

document.getElementById("device").innerText = device


/* -------- BROWSER -------- */

var browser="Unknown"

if(ua.includes("Chrome")) browser="Chrome"
else if(ua.includes("Firefox")) browser="Firefox"
else if(ua.includes("Safari")) browser="Safari"

document.getElementById("browser").innerText = browser


/* -------- OPERATING SYSTEM -------- */

var os="Unknown"

if(ua.includes("Windows")) os="Windows"
else if(ua.includes("Android")) os="Android"
else if(ua.includes("iPhone")) os="iOS"
else if(ua.includes("Mac")) os="MacOS"

document.getElementById("os").innerText = os


/* -------- GPS MAP -------- */

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

var lat = position.coords.latitude
var lon = position.coords.longitude

document.getElementById("lat").innerText = lat
document.getElementById("lon").innerText = lon

var map = L.map('map').setView([lat, lon], 13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

L.marker([lat, lon]).addTo(map)
.bindPopup("Your Location")
.openPopup()

})

}else{

document.getElementById("map").innerHTML="GPS not supported"

}

</script>

</body>
</html>
